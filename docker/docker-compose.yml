name: ff-ai-frontend

services:
  user-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: user-web
    image: ff-ai-frontend-user-web:latest
    ports:
      - "18080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  admin-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: admin-web
    image: ff-ai-frontend-admin-web:latest
    ports:
      - "18081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
