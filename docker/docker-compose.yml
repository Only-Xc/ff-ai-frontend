name: ff-ai-frontend

services:
  user-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: user-web
    image: ff-ai-frontend-user-web:latest
    ports:
      - "18080:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL in docker/.env or shell}
    networks:
      - ff-ai-backend-net
    restart: unless-stopped

  admin-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: admin-web
    image: ff-ai-frontend-admin-web:latest
    ports:
      - "18081:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL in docker/.env or shell}
    networks:
      - ff-ai-backend-net
    restart: unless-stopped

networks:
  ff-ai-backend-net:
    external: true
